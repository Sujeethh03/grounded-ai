services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ledgerlens
      POSTGRES_PASSWORD: ledgerlens
      POSTGRES_DB: ledgerlens
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerlens"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/ledgerlens
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file: [.env]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: ..
      dockerfile: infra/worker.Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
  neo4jdata:
